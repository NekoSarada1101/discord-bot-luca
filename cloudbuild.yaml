steps:
  # 1. コンテナイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # 2. Artifact Registryへのイメージのプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

  # 3. Cloud Runへのデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--service-account'
      - '$_RUN_SERVICE_ACCOUNT'
      # -- 平文の環境変数の設定 --
      # APP_PUBLIC_URLはCloud Runの払い出しURL（またはカスタムドメイン）を指定する
      - '--set-env-vars'
      - 'APP_PUBLIC_URL=$_APP_PUBLIC_URL'
      - 'FINOPS_BQ_DATASET=$_FINOPS_BQ_DATASET'
      - 'FINOPS_BQ_TABLE=$_FINOPS_BQ_TABLE'
      # -- シークレットの注入 (Secret Managerからのマッピング) --
      # フォーマット: 環境変数名=SecretManagerのシークレット名:バージョン
      - '--set-secrets'
      - >-
        DISCORD_APP_ID=LUCA_DISCORD_APP_ID:latest,
        DISCORD_PUBLIC_KEY=LUCA_DISCORD_PUBLIC_KEY:latest,
        DISCORD_BOT_TOKEN=LUCA_DISCORD_BOT_TOKEN:latest,
        DISCORD_STREAMING_CHANNEL_ID=LUCA_DISCORD_STREAMING_CHANNEL_ID:latest,
        DISCORD_FINOPS_CHANNEL_ID=LUCA_DISCORD_FINOPS_CHANNEL_ID:latest,
        TWITCH_CLIENT_ID=LUCA_TWITCH_CLIENT_ID:latest,
        TWITCH_CLIENT_SECRET=LUCA_TWITCH_CLIENT_SECRET:latest,
        TWITCH_WEBHOOK_SECRET=LUCA_TWITCH_WEBHOOK_SECRET:latest,
        CRON_SECRET=LUCA_CRON_SECRET:latest

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
